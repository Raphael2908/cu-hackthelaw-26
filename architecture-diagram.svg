<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1660 800" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1660" height="800" fill="#f8fafc"/>

  <!-- Title -->
  <text x="60" y="58" font-size="34" font-weight="800" fill="#0f172a">Legal Drafting Copilot</text>
  <text x="60" y="90" font-size="18" fill="#64748b">A legal brief in &#8594; a synthesised, cited argument out &#8212; via a multi-agent research &amp; review pipeline</text>

  <!-- ===== arrows (drawn first, under boxes) ===== -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none">
    <line x1="195" y1="380" x2="251" y2="380" marker-end="url(#arrow)"/>
    <line x1="405" y1="380" x2="461" y2="380" marker-end="url(#arrow)"/>
    <!-- coordinator fan-out to web + doc -->
    <path d="M615,380 C662,380 650,235 691,235" marker-end="url(#arrow)"/>
    <path d="M615,380 C662,380 650,525 691,525" marker-end="url(#arrow)"/>
    <!-- web + doc fan-in to reranker -->
    <path d="M845,235 C888,235 864,380 901,380" marker-end="url(#arrow)"/>
    <path d="M845,525 C888,525 864,380 901,380" marker-end="url(#arrow)"/>
    <line x1="1055" y1="380" x2="1101" y2="380" marker-end="url(#arrow)"/>
    <line x1="1255" y1="380" x2="1301" y2="380" marker-end="url(#arrow)"/>
    <line x1="1455" y1="380" x2="1481" y2="380" marker-end="url(#arrow)"/>
  </g>

  <!-- plan.md label on planner -> coordinator -->
  <text x="433" y="368" text-anchor="middle" font-size="12" font-style="italic" fill="#6366f1">plan.md</text>

  <!-- ===== boxes ===== -->
  <!-- Input -->
  <g filter="url(#shadow)">
    <rect x="45" y="334" width="150" height="92" rx="16" fill="#eef2f7" stroke="#64748b" stroke-width="2"/>
  </g>
  <text x="120" y="368" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Legal brief</text>
  <text x="120" y="386" text-anchor="middle" font-size="12.5" font-style="italic" fill="#64748b">(task)</text>
  <text x="120" y="404" text-anchor="middle" font-size="12.5" fill="#475569">+ documents + N</text>

  <!-- Planner -->
  <g filter="url(#shadow)">
    <rect x="255" y="334" width="150" height="92" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  </g>
  <text x="330" y="372" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Planner</text>
  <text x="330" y="396" text-anchor="middle" font-size="12.5" fill="#475569">decomposes the task</text>

  <!-- Coordinator -->
  <g filter="url(#shadow)">
    <rect x="465" y="334" width="150" height="92" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  </g>
  <text x="540" y="372" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Coordinator</text>
  <text x="540" y="396" text-anchor="middle" font-size="12.5" fill="#475569">dispatches agents</text>

  <!-- Web agent -->
  <g filter="url(#shadow)">
    <rect x="695" y="189" width="150" height="92" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="770" y="227" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Web agent</text>
  <text x="770" y="251" text-anchor="middle" font-size="12.5" fill="#475569">Perplexity &#183; CELLAR (EU)</text>

  <!-- Doc agent -->
  <g filter="url(#shadow)">
    <rect x="695" y="479" width="150" height="92" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="770" y="517" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Doc agent</text>
  <text x="770" y="541" text-anchor="middle" font-size="12.5" fill="#475569">uploaded documents</text>

  <!-- Reranker -->
  <g filter="url(#shadow)">
    <rect x="905" y="334" width="150" height="92" rx="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="980" y="372" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Reranker</text>
  <text x="980" y="396" text-anchor="middle" font-size="12.5" fill="#475569">ranks by relevance</text>

  <!-- Evaluator -->
  <g filter="url(#shadow)">
    <rect x="1105" y="334" width="150" height="92" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  </g>
  <text x="1180" y="372" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Evaluator</text>
  <text x="1180" y="396" text-anchor="middle" font-size="12.5" fill="#475569">scrutinises top-N</text>

  <!-- Synthesiser -->
  <g filter="url(#shadow)">
    <rect x="1305" y="334" width="150" height="92" rx="16" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  </g>
  <text x="1380" y="372" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Synthesiser</text>
  <text x="1380" y="396" text-anchor="middle" font-size="12.5" fill="#475569">drafts the argument</text>

  <!-- Output -->
  <g filter="url(#shadow)">
    <rect x="1485" y="334" width="150" height="92" rx="16" fill="#0f172a" stroke="#0f172a" stroke-width="2"/>
  </g>
  <text x="1560" y="372" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Argument</text>
  <text x="1560" y="396" text-anchor="middle" font-size="12.5" fill="#cbd5e1">cited draft</text>

  <!-- N callout above evaluator -->
  <g>
    <rect x="1070" y="250" width="220" height="52" rx="10" fill="#fff1f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="1180" y="272" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b91c1c">N = how many top documents</text>
    <text x="1180" y="290" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b91c1c">to review &#8212; set by the lawyer</text>
    <line x1="1180" y1="302" x2="1180" y2="332" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="3 3"/>
  </g>

  <!-- ===== legend ===== -->
  <g transform="translate(60, 660)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#334155">Each box is an agent &#8212; grouped by role:</text>
    <g font-size="13.5" fill="#475569">
      <rect x="2" y="18" width="16" height="16" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
      <text x="26" y="31">Orchestration</text>
      <rect x="160" y="18" width="16" height="16" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
      <text x="184" y="31">Research</text>
      <rect x="290" y="18" width="16" height="16" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
      <text x="314" y="31">Ranking</text>
      <rect x="410" y="18" width="16" height="16" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
      <text x="434" y="31">Evaluation (human-in-the-loop)</text>
      <rect x="690" y="18" width="16" height="16" rx="4" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
      <text x="714" y="31">Synthesis</text>
    </g>
  </g>

  <text x="1600" y="700" text-anchor="end" font-size="13" fill="#94a3b8">Agents powered by Claude (Opus 4.8 &#183; Sonnet 4.6)</text>
</svg>
